# Azure pipeline for PyProximal

# Only build the master branch, tags, and PRs (on by default) to avoid building random
# branches in the repository until a PR is opened.
trigger:
  branches:
    include:
    - main
    - refs/tags/*

jobs:


# Mac
########################################################################################
- job:
  displayName: 'Mac'

  pool:
    vmImage: 'macOS-15-arm64'

  variables:
    NUMBA_NUM_THREADS: 1

  steps:
  - task: UsePythonVersion@0
    inputs:
      versionSpec: '3.11'
      architecture: 'arm64'

  - script: |
      python -m pip install --upgrade pip
      pip install uv
    displayName: 'Install uv'

  - script: |
      uv sync --locked --all-extras --all-groups
    displayName: 'Install dependencies and pyproximal'

  - script: |
      uv run pytest --color=yes pytests/
    condition: succeededOrFailed()
    displayName: 'Test with pytest'


# Linux
########################################################################################
- job:
  displayName: 'Linux'

  pool:
    vmImage: 'ubuntu-latest'

  variables:
    NUMBA_NUM_THREADS: 1

  steps:
  - task: UsePythonVersion@0
    inputs:
      versionSpec: '3.11'
      architecture: 'x64'

  - script: |
      python -m pip install --upgrade pip
      pip install uv
    displayName: 'Install uv'

  - script: |
      uv sync --locked --all-extras --all-groups
    displayName: 'Install dependencies and pyproximal'

  - script: |
      uv run pytest --color=yes pytests/
    condition: succeededOrFailed()
    displayName: 'Test with pytest'
