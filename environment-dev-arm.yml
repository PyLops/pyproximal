name: pyproximal
channels:
  - defaults
  - conda-forge
  - numba
dependencies:
  - python>=3.9.0
  - numpy>=1.21.0
  - scipy>=1.11.0
  - pylops>=2.0.0
  - scikit-image
  - matplotlib
  - ipython
  - pytest
  - Sphinx
  - numpydoc
  - numba
  - pip:
    - bm4d
    - bm3d
    - pytest-runner
    - setuptools_scm
    - pooch
    - pydata-sphinx-theme
    - sphinx-gallery
    - nbsphinx
    - image
    - sphinxemoji